# Serves Matrix delegation files on the apex domain. NPM should proxy ONLY the
# /.well-known/matrix/ location here (custom location) so an existing apex site
# is left untouched. $-vars below are nginx runtime vars — this file is static
# and must NOT be run through envsubst.
server {
    listen 80;
    server_name _;

    location /.well-known/matrix/ {
        root /usr/share/nginx/html;
        default_type application/json;
        # Browser clients (Element Web on another origin) must be able to read these.
        add_header Access-Control-Allow-Origin '*' always;
    }

    location / {
        return 404;
    }
}
