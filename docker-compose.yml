# Neo — Matrix all-in-one. Toggle optional services via COMPOSE_PROFILES in .env.
# Run ./scripts/bootstrap.sh once before `docker compose up -d`.
#
# Tuned for: Xeon D-1540 (8c/16t), 32 GB RAM, NVMe RAID, a handful of users.
# The box is heavily over-provisioned for this load, so limits below exist to
# stop any one service ballooning — not because resources are tight.

name: neo

x-restart: &restart
  restart: unless-stopped

services:
  # --- Core -----------------------------------------------------------------

  postgres:
    <<: *restart
    image: postgres:${POSTGRES_IMAGE_TAG}
    container_name: neo-postgres
    environment:
      POSTGRES_USER: synapse
      POSTGRES_DB: synapse
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      # Synapse rejects any collation but C; force it at cluster init. Explicit
      # --encoding is required or a C locale defaults the encoding to SQL_ASCII.
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --lc-collate=C --lc-ctype=C"
    # Tuning appended to image defaults. Cache sizes are generous for a small DB
    # (headroom on 32 GB); cost/concurrency settings assume NVMe; parallelism
    # matches the 8-core CPU.
    command:
      - postgres
      - -c
      - shared_buffers=2GB
      - -c
      - effective_cache_size=8GB
      - -c
      - maintenance_work_mem=512MB
      - -c
      - work_mem=16MB
      - -c
      - max_connections=100
      - -c
      - random_page_cost=1.1
      - -c
      - effective_io_concurrency=200
      - -c
      - wal_compression=on
      - -c
      - max_wal_size=2GB
      - -c
      - min_wal_size=512MB
      - -c
      - checkpoint_completion_target=0.9
      - -c
      - max_worker_processes=8
      - -c
      - max_parallel_workers=8
      - -c
      - max_parallel_workers_per_gather=2
      - -c
      - max_parallel_maintenance_workers=2
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Runs on first cluster init only — creates the `mas` database.
      - ./config/postgres/initdb:/docker-entrypoint-initdb.d:ro
    networks: [neo-internal]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U synapse -d synapse"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 4G

  synapse:
    <<: *restart
    image: ghcr.io/element-hq/synapse:${SYNAPSE_IMAGE_TAG}
    container_name: neo-synapse
    # tini as PID 1 reaps zombie subprocesses and forwards signals, so the
    # container can always be stopped/recreated cleanly (start.py doesn't reap).
    init: true
    # Run as the host user so the ./data/synapse bind mount stays writable.
    user: "${NEO_PUID:-1000}:${NEO_PGID:-1000}"
    environment:
      SYNAPSE_CONFIG_PATH: /data/homeserver.yaml
    volumes:
      - ./data/synapse:/data
      - ./config/synapse/homeserver.yaml:/data/homeserver.yaml:ro
      - ./config/synapse/log.config:/data/log.config:ro
    # neo-internal reaches Postgres; proxy gives federation a route to the internet.
    networks: [neo-internal, proxy]
    # Forward external lookups to reliable resolvers so federation DNS bursts
    # (joining big rooms => thousands of lookups) don't get dropped by the host's
    # systemd-resolved stub. Internal names still resolve via Docker's 127.0.0.11.
    dns:
      - 1.1.1.1
      - 9.9.9.9
    # Published on loopback so a host-mode nginx proxy manager can forward here.
    ports:
      - "127.0.0.1:${NEO_PORT_SYNAPSE:-8801}:8008"
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '4'
          # Generous headroom — big-room state resolution + federation can spike
          # well past 4G; on a 32G box a low ceiling just causes OOM kills.
          memory: 12G

  wellknown:
    <<: *restart
    image: nginx:1.27-alpine
    container_name: neo-wellknown
    volumes:
      - ./config/wellknown/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./config/wellknown/server.json:/usr/share/nginx/html/.well-known/matrix/server:ro
      - ./config/wellknown/client.json:/usr/share/nginx/html/.well-known/matrix/client:ro
    networks: [proxy]
    deploy:
      resources:
        limits:
          memory: 128M

  # --- mas profile (delegated authentication) -------------------------------

  mas:
    <<: *restart
    image: ghcr.io/element-hq/matrix-authentication-service:${MAS_IMAGE_TAG}
    container_name: neo-mas
    profiles: [mas]
    command: ["server", "--config", "/config/config.yaml"]
    volumes:
      - ./config/mas:/config:ro
    # neo-internal reaches Postgres + Synapse; proxy gives an egress route.
    networks: [neo-internal, proxy]
    dns:
      - 1.1.1.1
      - 9.9.9.9
    ports:
      - "127.0.0.1:${NEO_PORT_MAS:-8802}:8080"
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M

  # --- element profile ------------------------------------------------------

  element:
    <<: *restart
    image: vectorim/element-web:${ELEMENT_IMAGE_TAG}
    container_name: neo-element
    profiles: [element]
    volumes:
      - ./config/element/config.json:/app/config.json:ro
    networks: [proxy]
    ports:
      - "127.0.0.1:${NEO_PORT_ELEMENT:-8803}:80"
    deploy:
      resources:
        limits:
          memory: 128M

  # --- admin profile --------------------------------------------------------

  synapse-admin:
    <<: *restart
    image: ghcr.io/etkecc/ketesa:${KETESA_IMAGE_TAG}
    container_name: neo-synapse-admin
    profiles: [admin]
    networks: [proxy]
    # Ketesa (static-web-server) listens on 8080 despite the image's EXPOSE 80.
    ports:
      - "127.0.0.1:${NEO_PORT_ADMIN:-8804}:8080"
    deploy:
      resources:
        limits:
          memory: 128M

  # --- coturn profile -------------------------------------------------------

  coturn:
    <<: *restart
    image: coturn/coturn:${COTURN_IMAGE_TAG}
    container_name: neo-coturn
    profiles: [coturn]
    # Host networking is mandatory: Docker's NAT rewrites relay candidates and
    # TURN calls never connect through a bridge network.
    network_mode: host
    command: ["-c", "/etc/coturn/turnserver.conf"]
    volumes:
      - ./config/coturn/turnserver.conf:/etc/coturn/turnserver.conf:ro
      # Cert dir for turns:// (5349). Points at COTURN_CERT_DIR on the host.
      - ${COTURN_CERT_DIR:-./config/coturn}:/certs:ro
    deploy:
      resources:
        limits:
          memory: 256M

  # --- monitoring profile ---------------------------------------------------

  prometheus:
    <<: *restart
    image: prom/prometheus:${PROMETHEUS_IMAGE_TAG}
    container_name: neo-prometheus
    profiles: [monitoring]
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=30d
    volumes:
      - ./config/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks: [neo-internal]
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G

  grafana:
    <<: *restart
    image: grafana/grafana:${GRAFANA_IMAGE_TAG}
    container_name: neo-grafana
    profiles: [monitoring]
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      # Required so redirects and asset URLs work behind the reverse proxy.
      GF_SERVER_ROOT_URL: https://${NEO_GRAFANA_HOST}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./config/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./config/monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    networks: [neo-internal, proxy]
    ports:
      - "127.0.0.1:${NEO_PORT_GRAFANA:-8805}:3000"
    depends_on: [prometheus]
    deploy:
      resources:
        limits:
          memory: 512M

  node-exporter:
    <<: *restart
    image: prom/node-exporter:${NODE_EXPORTER_IMAGE_TAG}
    container_name: neo-node-exporter
    profiles: [monitoring]
    # Reads host metrics via the mounts below (not the container's own view).
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    networks: [neo-internal]
    deploy:
      resources:
        limits:
          memory: 128M

  cadvisor:
    <<: *restart
    image: gcr.io/cadvisor/cadvisor:${CADVISOR_IMAGE_TAG}
    container_name: neo-cadvisor
    profiles: [monitoring]
    privileged: true
    devices:
      - /dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    networks: [neo-internal]
    deploy:
      resources:
        limits:
          memory: 512M

  # --- workers profile (scale-out; Phase 1 = outbound federation sender) -------

  redis:
    <<: *restart
    image: redis:${REDIS_IMAGE_TAG}
    container_name: neo-redis
    profiles: [workers]
    # Replication bus between Synapse processes — no persistence needed.
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    networks: [neo-internal]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M

  fedsender:
    <<: *restart
    image: ghcr.io/element-hq/synapse:${SYNAPSE_IMAGE_TAG}
    container_name: neo-fedsender
    profiles: [workers]
    init: true
    user: "${NEO_PUID:-1000}:${NEO_PGID:-1000}"
    environment:
      SYNAPSE_WORKER: synapse.app.generic_worker
    command: ["run", "--config-path", "/data/homeserver.yaml", "--config-path", "/config/worker-fedsender.yaml"]
    volumes:
      - ./data/synapse:/data
      - ./config/synapse/homeserver.yaml:/data/homeserver.yaml:ro
      - ./config/synapse/log.config:/data/log.config:ro
      - ./config/synapse/worker-fedsender.yaml:/config/worker-fedsender.yaml:ro
    # proxy + pinned DNS: outbound federation (and its DNS load) runs here now.
    networks: [neo-internal, proxy]
    dns:
      - 1.1.1.1
      - 9.9.9.9
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 4G

  # Phase 2 workers — inbound federation + client sync (need NPM routing).
  fedreader:
    <<: *restart
    image: ghcr.io/element-hq/synapse:${SYNAPSE_IMAGE_TAG}
    container_name: neo-fedreader
    profiles: [workers]
    init: true
    user: "${NEO_PUID:-1000}:${NEO_PGID:-1000}"
    environment:
      SYNAPSE_WORKER: synapse.app.generic_worker
    command: ["run", "--config-path", "/data/homeserver.yaml", "--config-path", "/config/worker-fedreader.yaml"]
    volumes:
      - ./data/synapse:/data
      - ./config/synapse/homeserver.yaml:/data/homeserver.yaml:ro
      - ./config/synapse/log.config:/data/log.config:ro
      - ./config/synapse/worker-fedreader.yaml:/config/worker-fedreader.yaml:ro
    networks: [neo-internal, proxy]
    # Inbound reader also fetches missing events/state outbound → egress + DNS.
    dns:
      - 1.1.1.1
      - 9.9.9.9
    ports:
      - "127.0.0.1:${NEO_PORT_FEDREADER:-8806}:8083"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 4G

  synchrotron:
    <<: *restart
    image: ghcr.io/element-hq/synapse:${SYNAPSE_IMAGE_TAG}
    container_name: neo-synchrotron
    profiles: [workers]
    init: true
    user: "${NEO_PUID:-1000}:${NEO_PGID:-1000}"
    environment:
      SYNAPSE_WORKER: synapse.app.generic_worker
    command: ["run", "--config-path", "/data/homeserver.yaml", "--config-path", "/config/worker-synchrotron.yaml"]
    volumes:
      - ./data/synapse:/data
      - ./config/synapse/homeserver.yaml:/data/homeserver.yaml:ro
      - ./config/synapse/log.config:/data/log.config:ro
      - ./config/synapse/worker-synchrotron.yaml:/config/worker-synchrotron.yaml:ro
    networks: [neo-internal, proxy]
    dns:
      - 1.1.1.1
      - 9.9.9.9
    ports:
      - "127.0.0.1:${NEO_PORT_SYNCHROTRON:-8807}:8084"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 2G

networks:
  neo-internal:
    internal: true
  proxy:
    external: true
    name: ${NEO_PROXY_NETWORK:-nginxproxymanager_default}

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:
